<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  {{ if eq .Layout "records" }}
    <link rel="stylesheet" href="{{ "css/records.css" | relURL }}">
  {{ end }}
  <link rel="icon" type="image/png" href="{{ "favicon.png" | relURL }}">
  <style>
    .media-image { width: 100%; border-radius: 6px; margin-top: 1rem; }
  </style>
</head>
<body>
  {{ partial "header.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
  <script src="{{ "js/tracker.js" | relURL }}"></script>
  {{ if eq .Layout "records" }}
    <script src="{{ "js/records.js" | relURL }}"></script>
  {{ end }}
</body>
</html>
